name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macos-x86_64
            os: macos-26-intel
            target: x86_64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build openshard
        run: cargo build --release --locked -p openshard-server --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: tar -czf "openshard-${{ matrix.name }}.tar.gz" -C "target/${{ matrix.target }}/release" openshard

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/openshard.exe" -DestinationPath "openshard-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openshard-${{ matrix.name }}
          path: |
            openshard-${{ matrix.name }}.tar.gz
            openshard-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openshard-*.tar.gz
            dist/openshard-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
