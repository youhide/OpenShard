# OpenShard configuration.

[server]
name = "OpenShard"

# Where to bind. 0.0.0.0 listens on every interface.
listen = "0.0.0.0:2593"

# What to TELL CLIENTS to dial, in the 0x8C relay packet.
#
# NOT the same as `listen`, and the single most likely reason a client hangs.
# `listen` is where this shard answers; `advertise` is the address it hands out.
# Get it wrong and the failure is silent from here: the client logs in fine,
# picks the shard, is told to dial somewhere it cannot reach, and sits on
# "logging into shard" until it times out. This end sees one connection and a
# disconnect, and nothing that looks like an error, because nothing here failed.
#
# The default only works if the client runs on THIS MACHINE. A client anywhere
# else — another PC, a VM, a phone — will dial its own 127.0.0.1 and find
# nothing.
#
#   client on this machine   127.0.0.1:2593
#   client on your LAN       this machine's LAN address, e.g. 192.168.1.10:2593
#   client over the internet your PUBLIC address, with 2593 forwarded
advertise = "127.0.0.1:2593"

[world]
# The client install directory, holding map0LegacyMUL.uop and tiledata.mul.
#
# Leave empty and the shard runs with no map at all: every step is allowed and
# players walk through walls and across water. Useful for testing the protocol,
# useless as a game.
client_files = ""

# Which facets to load: 0 is Felucca, then Trammel, Ilshenar, Malas, Tokuno,
# Ter Mur. A character stays on its facet; there is no travel between them yet.
facets = [0]

# Where a new character appears. The height comes from the map, not from here.
#
# This default is open ground on one facet and may be open water on yours.
[world.start]
x = 1363
y = 1600

[persistence]
# Where the world is kept. Leave empty to keep it in memory and lose it at stop;
# give it a value to have characters survive a restart. A "postgres://" URL uses
# PostgreSQL; anything else is a SQLite file path. Neither backend is a tier.
#
#   database = "openshard.db"
#   database = "postgres://user:pass@localhost/openshard"
database = ""

# How often to save the world, in seconds. The save never stops the world (an
# instant snapshot, written off to the side), so this is only how much play a
# crash could cost. A clean shutdown and the staff ".save" command always save.
# 0 turns the periodic save off. Default is 180.
#   save_seconds = 120
save_seconds = 180

[scripting]
# The gameplay script the shard loads and hot-reloads. A path to a .js/.ts file.
#
# Leave empty and nothing reacts on its own: mobiles move when clients ask and
# no more. Point it at a script and the shard delivers domain events to it every
# tick and applies the commands it enqueues. The file is watched — save it and
# the hooks reload without a restart.
#
#   main = "scripts/main.js"
main = ""

[gameplay]
# The rules knobs — the SphereServer sphere.ini equivalents. Every value here has
# a working default; uncomment one only to change the shard's feel.

# Which swing-speed formula combat uses (Sphere's CombatEra). Implemented:
#   1 pre-AoS      2 AoS
# Sphere's 0, 3 and 4 need weapon weight or ML-format speeds not built yet.
combat_era = 1

# The swing formula's numerator (Sphere's SpeedScaleFactor). Larger is slower.
# Pre-AoS is 15000; AoS uses 40000.
speed_scale_factor = 15000

# Milliseconds between a hunting creature's steps. The classic pace is 400 —
# slower than a running player (250), so outrunning a monster works the way it
# always has. Set 250 to let monsters keep pace with a runner.
# creature_step_ms = 400

# The ceiling any one skill trains to, in tenths (1000 = 100.0).
skill_cap = 1000

# How long an item lies on the ground before it rots, in seconds.
decay_seconds = 1200

# How long a criminal flag lasts after a grey act, in seconds.
criminal_seconds = 120

# How far speech carries, in tiles: normal, a whisper, a yell.
distance_talk = 18
distance_whisper = 3
distance_yell = 31

# How a spell is cast — the Sphere-vs-ServUO knob.
#   "servuo"  the UO original: the caster stops, says the words over a cast
#             delay, and the target cursor comes up only after (then it may walk).
#   "sphere"  Sphere's feel: the spell resolves as it is cast, no rooting — the
#             caster keeps walking, and any target cursor comes up at once.
cast_style = "servuo"

# Whether taking damage while casting disturbs the spell (UO's fizzle). Only
# bites in the "servuo" cast style, where there is a cast delay to interrupt.
spell_disturb = true

# AoS object tooltips — the "cliloc" hover names, Sphere's TOOLTIPMODE.
#   "version"  send a revision when a thing is drawn, and the full tooltip only
#              when the client asks for it (the bandwidth-cheap standard).
#   "full"     send the whole tooltip up front.
#   "off"      no tooltips, and do not advertise AoS — a modern client then falls
#              back to the classic single-click name label.
tooltips = "version"

# Whether to offer right-click / single-click context menus (the 0xBF popup):
# open a container, a vendor's buy/sell, a paperdoll. With tooltips = "off" and
# this false, the classic client stays on plain single-click names.
context_menus = true

# Spell cost — mana and reagents. Independent of the cast style above.
#
# Sphere confirmed the model: mana and reagents are spent at *resolution*, once
# the cast has succeeded or fizzled — not up front — so the two "loss on fail"
# knobs decide what a fizzle costs (Sphere's ManaLossFail / ReagentLossFail). A
# successful cast always spends. The ServUO/UO original is all three true.
#
# reagents               require and consume reagents (false = cast from mana
#                        alone, a no-reagent shard).
# mana_loss_on_fail      a fizzled cast still burns the mana (false refunds it).
# reagent_loss_on_fail   a fizzled cast still consumes the reagents.
reagents = true
mana_loss_on_fail = true
reagent_loss_on_fail = true

# The bank box, and what it is good for.
#
# UO's own answer to both is what these ship as. A bank box is a *virtual* item
# in ServUO: its contents are not carried, so they weigh nothing (always true
# here, whatever these say) and its gold is not on the status bar — which is the
# reason a banker has to be asked for a balance. But a vendor does reach it: a
# purchase takes from the pack, and failing that from the bank, saying which
# paid.
#
# bank_gold_in_status    add the bank's gold to the status bar's gold field.
# vendor_bank_payment    let an NPC purchase fall back to the bank.
bank_gold_in_status = false
vendor_bank_payment = true

# Level of detail — an opt-in performance knob. When lod is on, a creature with
# no player within lod_radius tiles stops paying for the full AI decision (line
# of sight, target scan, pathfinding) each beat, and dozes at a beat stretched
# lod_idle_factor times slower instead — it wakes the instant a player comes
# within range. Off by default: every creature simulates at full rate whether or
# not anyone is near. lod_radius is kept above the view range (18) and the
# largest creature sight, so a creature a player can see is never dozed.
# lod = false
# lod_radius = 32
# lod_idle_factor = 8

# Development accounts, in plaintext, until there is a database.
[[accounts]]
name = "admin"
password = "hunter2"
characters = ["Lord British"]
